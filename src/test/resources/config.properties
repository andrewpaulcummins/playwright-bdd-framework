# =============================================================================
# PLAYWRIGHT BDD FRAMEWORK — CONFIGURATION FILE
# =============================================================================
# Controls runtime behaviour of the framework.
# No Java code needs to be modified to change any of these values.
# =============================================================================

# =============================================================================
# BROWSER CONFIGURATION
# =============================================================================
# Supported values: chromium | firefox | webkit
# Playwright manages its own browser binaries — no WebDriverManager needed.
# =============================================================================
browser=chromium
headless=false

# =============================================================================
# ENVIRONMENT CONFIGURATION
# =============================================================================
environment=prod
ui.base.url=https://www.saucedemo.com
api.base.url=https://reqres.in/api
api.secondary.url=https://jsonplaceholder.typicode.com

# =============================================================================
# PLAYWRIGHT SPECIFIC CONFIGURATION
# =============================================================================
# slow.motion: adds a delay (ms) between each Playwright action.
# Useful for visually following test execution during debugging.
# Set to 0 for normal speed execution.
slow.motion=0

# Default timeout for Playwright actions and assertions (milliseconds).
# Playwright uses a single timeout rather than separate implicit/explicit waits.
# Default is 30000ms (30 seconds).
default.timeout=30000

# Navigation timeout — maximum time to wait for page navigation (milliseconds).
navigation.timeout=30000

# =============================================================================
# TEST DATA CONFIGURATION
# =============================================================================
test.data.path=testdata/users.json
encryption.algorithm=AES

# =============================================================================
# SCREENSHOT & TRACE CONFIGURATION
# =============================================================================
screenshot.on.failure=true
screenshot.path=target/screenshots

# Playwright trace viewer — captures full execution trace including
# screenshots, network requests, and DOM snapshots.
# Supported values: on | off | retain-on-failure
# retain-on-failure is recommended — only saves traces when tests fail.
trace.mode=retain-on-failure
trace.path=target/traces

# =============================================================================
# ALLURE REPORTING
# =============================================================================
allure.results.dir=target/allure-results

# =============================================================================
# LOGGING
# =============================================================================
log.level=INFO